<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>markdown-RBMK</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.1rem;
        background: #0d1117;
        color: #c9d1d9;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;

      p { margin: 0; color: #8b949e; max-width: 30rem; line-height: 1.5; }
      code { background: #161b22; padding: 0.15rem 0.4rem; border-radius: 4px; color: #7fae8f; }

  <body>
    <h1>☢️ markdown-RBMK</h1>
    <p>Your GitHub activity, rendered as an RBMK reactor-core SVG badge.</p>
    <img src="/api/badge?username=Seungpyo1007&amp;mode=commit" alt="reactor core badge" />
    <p>
      Embed: <code>/api/badge?username=YOUR_NAME</code><br />
      modes: <code>commit</code> · <code>language</code> · <code>hybrid</code>
    </p>
    <p><a href="https://github.com/Seungpyo1007/markdown-rbmk">Documentation on GitHub →</a></p>
